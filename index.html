<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ForgeNow — Employer Network</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F4F1EB;--surface:#FFF;--ink:#1A1A18;--ink-muted:#6B6861;--ink-faint:#B5B2A9;--border:#E0DDD6;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 22px;height:58px;display:flex;align-items:center;gap:14px;flex-shrink:0;z-index:10}
.logo{height:30px;width:auto}
.hdr-sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
.hdr-sub{font-size:12.5px;color:var(--ink-muted);white-space:nowrap;flex-shrink:0}
.filters{display:flex;gap:5px;overflow-x:auto;flex:1}
.filters::-webkit-scrollbar{display:none}
.chip-all,.chip{padding:4px 11px;border-radius:99px;border:1.5px solid var(--border);font-size:11px;font-weight:500;color:var(--ink-muted);cursor:pointer;transition:all .15s;background:transparent;white-space:nowrap;flex-shrink:0}
.chip-all:hover,.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip-all.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.hdr-count{font-size:12px;color:var(--ink-faint);white-space:nowrap;flex-shrink:0}
.map-wrap{flex:1;position:relative;overflow:hidden}
#map-svg{width:100%;height:100%}
.state-path{fill:#EBE7DF;stroke:#D8D4CC;stroke-width:.7}
.tt{position:absolute;pointer-events:none;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:0;box-shadow:0 6px 24px rgba(0,0,0,.13);max-width:260px;min-width:200px;opacity:0;transform:translateY(4px);transition:opacity .12s,transform .12s;z-index:300}
.tt.show{opacity:1;transform:translateY(0)}
.tt-head{padding:11px 13px 9px;border-bottom:1px solid var(--border)}
.tt-parent{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:4px}
.tt-contractor{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;color:var(--ink);line-height:1.2}
.tt-body{padding:9px 13px 11px}
.tt-loc{font-size:12px;color:var(--ink-muted)}
.legend{position:absolute;bottom:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.leg-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);margin-bottom:7px}
.leg-r{display:flex;align-items:center;gap:7px;margin-bottom:4px;font-size:11.5px;color:var(--ink-muted)}
.leg-r:last-child{margin-bottom:0}
.leg-d{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ctrls{position:absolute;bottom:16px;left:16px;display:flex;flex-direction:column;gap:4px}
.cb{width:30px;height:30px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-muted);box-shadow:0 2px 8px rgba(0,0,0,.07);transition:all .15s;font-family:monospace}
.cb:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
</style>
</head>

const HEX={"The SEER Group":"#E8A020","Neighborly / Mr. Electric":"#0B6E5A","Neighborly / Mr. Rooter":"#1D5FA8","Neighborly / Aire Serv":"#C8390A","Neighborly / Mr. Handyman":"#7A4D0F","TurnPoint Services":"#7C3AED","ABM Industries":"#0E7490","Kelso Industries":"#BE185D","Legacy Service Partners":"#166534","Paschal Air, Plumbing & Electric":"#B45309"};
const TOTAL=529;
let aF='all',svgEl,proj,zB,currentScale=1;
function filt(){return aF==='all'?DOTS:DOTS.filter(d=>d.parent===aF);}
function setAll(el){
  aF='all';
  document.querySelectorAll('.chip,.chip-all').forEach(c=>{c.classList.remove('on');c.style.background='';c.style.color='';c.style.borderColor='';});
  el.classList.add('on');
  document.getElementById('hdr-count').textContent=TOTAL+' employers';
  renderDots();
}
function setFilter(el){
  const f=el.dataset.f,col=el.dataset.col;
  aF=f;
  document.querySelectorAll('.chip,.chip-all').forEach(c=>{c.classList.remove('on');c.style.background='';c.style.color='';c.style.borderColor='';});
  el.style.background=col;el.style.color='#fff';el.style.borderColor=col;
  const shown=DOTS.filter(d=>d.parent===f).length;
  document.getElementById('hdr-count').textContent=shown+' employers';
  renderDots();
}
function renderDots(){
  if(!svgEl||!proj)return;
  const g=svgEl.select('#dots-g');g.selectAll('*').remove();
  const tt=document.getElementById('tt');
  filt().forEach(d=>{
    const xy=proj([d.lng,d.lat]);if(!xy)return;
    const[x,y]=xy,col=HEX[d.parent]||'#888';
    const dotR=Math.max(1.5, 5.5/currentScale);
    const dotSW=Math.max(0.4, 1.5/currentScale);
    const dot=g.append('circle').attr('cx',x).attr('cy',y).attr('r',dotR)
      .attr('fill',col).attr('stroke','white').attr('stroke-width',dotSW).attr('opacity',.88).style('cursor','default');
    dot.on('mousemove',ev=>{
        const r=document.getElementById('map-wrap').getBoundingClientRect();
        let tx=ev.clientX-r.left+14,ty=ev.clientY-r.top-14;
        if(tx+265>r.width)tx-=278;
        if(ty+110>r.height)ty=ev.clientY-r.top-105;
        tt.style.left=tx+'px';tt.style.top=ty+'px';
        tt.innerHTML=`<div class="tt-head"><div class="tt-parent" style="color:${col}">${d.parent}</div><div class="tt-contractor">${d.contractor}</div></div><div class="tt-body"><div class="tt-loc">📍 ${d.location}</div></div>`;
        tt.classList.add('show');
      }).on('mouseleave',()=>tt.classList.remove('show'));
  });
}
function zIn(){svgEl.transition().call(zB.scaleBy,1.45);}
function zOut(){svgEl.transition().call(zB.scaleBy,.70);}
function zReset(){svgEl.transition().duration(450).call(zB.transform,d3.zoomIdentity);}
async function init(){
  svgEl=d3.select('#map-svg');
  const W=document.getElementById('map-wrap').clientWidth||960,H=document.getElementById('map-wrap').clientHeight||580;
  proj=d3.geoAlbersUsa().scale(1150).translate([W/2,H/2]);
  svgEl.attr('viewBox',`0 0 ${W} ${H}`);
  const sg=svgEl.append('g').attr('id','states-g');svgEl.append('g').attr('id','dots-g');
  zB=d3.zoom().scaleExtent([.7,10]).on('zoom',e=>{sg.attr('transform',e.transform);svgEl.select('#dots-g').attr('transform',e.transform);currentScale=e.transform.k;renderDots();});
  svgEl.call(zB);
  try{
    const us=await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
    sg.selectAll('path').data(topojson.feature(us,us.objects.states).features).enter().append('path').attr('class','state-path').attr('d',d3.geoPath().projection(proj));
    renderDots();
  }catch(e){
    svgEl.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('fill','#B5B2A9').attr('font-size','14').text('Map unavailable — check internet connection');
  }
}

<script>init()</script>
