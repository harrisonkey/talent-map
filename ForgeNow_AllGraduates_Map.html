<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ForgeNow — Graduate Talent Network</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F1EB;--surface:#FFF;--ink:#1A1A18;--ink-muted:#6B6861;--ink-faint:#B5B2A9;
  --border:#E0DDD6;
  --hvac:#C8390A;--hvac-bg:#FDF0EC;
  --elec:#0B6E5A;--elec-bg:#E5F4F1;
  --plumb:#1D5FA8;--plumb-bg:#E8F0FB;
  --fac:#7A4D0F;--fac-bg:#F7EFE2;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER — logo + filters only */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:58px;display:flex;align-items:center;gap:20px;flex-shrink:0;z-index:10}
.logo{height:30px;width:auto}
.hdr-sep{width:1px;height:22px;background:var(--border)}
.hdr-sub{font-size:12.5px;color:var(--ink-muted)}
.filters{display:flex;gap:6px;margin-left:auto}
.chip{padding:5px 13px;border-radius:99px;border:1px solid var(--border);font-size:12px;font-weight:500;color:var(--ink-muted);cursor:pointer;transition:all .15s;background:transparent;white-space:nowrap}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on-all{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip.on-HVAC{background:var(--hvac);color:#fff;border-color:var(--hvac)}
.chip.on-ELECTRICAL{background:var(--elec);color:#fff;border-color:var(--elec)}
.chip.on-PLUMBING{background:var(--plumb);color:#fff;border-color:var(--plumb)}
.chip.on-FACILITIES{background:var(--fac);color:#fff;border-color:var(--fac)}

/* MAP — full width */
.map-wrap{flex:1;position:relative;overflow:hidden}
#map-svg{width:100%;height:100%}
.state-path{fill:#EBE7DF;stroke:#D8D4CC;stroke-width:.7}

/* TOOLTIP */
.tt{position:absolute;pointer-events:none;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 14px;box-shadow:0 6px 24px rgba(0,0,0,.12);min-width:160px;max-width:220px;opacity:0;transform:translateY(4px);transition:opacity .12s,transform .12s;z-index:300}
.tt.show{opacity:1;transform:translateY(0)}
.tt-loc{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--ink);margin-bottom:6px;line-height:1.2}
.tt-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:3px 8px;border-radius:5px}
.b-HVAC{background:var(--hvac-bg);color:var(--hvac)}
.b-ELECTRICAL{background:var(--elec-bg);color:var(--elec)}
.b-PLUMBING{background:var(--plumb-bg);color:var(--plumb)}
.b-FACILITIES{background:var(--fac-bg);color:var(--fac)}

/* LEGEND */
.legend{position:absolute;bottom:18px;right:18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 15px;box-shadow:0 2px 10px rgba(0,0,0,.07)}
.leg-t{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-faint);margin-bottom:8px}
.leg-r{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;color:var(--ink-muted)}
.leg-r:last-child{margin-bottom:0}
.leg-d{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ZOOM */
.ctrls{position:absolute;bottom:18px;left:18px;display:flex;flex-direction:column;gap:4px}
.cb{width:30px;height:30px;background:var(--surface);border:1px solid var(--border);border-radius:7px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink-muted);box-shadow:0 2px 8px rgba(0,0,0,.07);transition:all .15s;font-family:monospace}
.cb:hover{background:var(--ink);color:#fff;border-color:var(--ink)}
</style>
</head>

const HEX={HVAC:'#C8390A',ELECTRICAL:'#0B6E5A',PLUMBING:'#1D5FA8',FACILITIES:'#7A4D0F'};
const LBL={HVAC:'HVAC',ELECTRICAL:'Electrical',PLUMBING:'Plumbing',FACILITIES:'Facilities'};
let aF='all',svgEl,proj,zB;

function filt(){return DOTS.filter(s=>aF==='all'||s.p===aF);}

function setFilter(f,el){
  aF=f;
  document.querySelectorAll('.chip').forEach(c=>c.className='chip');
  el.classList.add(f==='all'?'on-all':'on-'+f);
  renderDots();
}

function renderDots(){
  if(!svgEl||!proj)return;
  const g=svgEl.select('#dots-g');
  g.selectAll('*').remove();
  const tt=document.getElementById('tt');
  filt().forEach(s=>{
    const xy=proj([s.lng,s.lat]);
    if(!xy)return;
    const[x,y]=xy,col=HEX[s.p]||'#888';
    const dot=g.append('circle')
      .attr('cx',x).attr('cy',y).attr('r',5)
      .attr('fill',col).attr('stroke','white').attr('stroke-width',1.5)
      .attr('opacity',.88).style('cursor','default');
    dot.on('mousemove',ev=>{
        const r=document.getElementById('map-wrap').getBoundingClientRect();
        let tx=ev.clientX-r.left+14,ty=ev.clientY-r.top-14;
        if(tx+230>r.width)tx-=244;
        if(ty+100>r.height)ty=ev.clientY-r.top-90;
        tt.style.left=tx+'px';tt.style.top=ty+'px';
        tt.innerHTML=`<div class="tt-loc">${s.l}</div><span class="tt-badge b-${s.p}">${LBL[s.p]||s.p}</span>`;
        tt.classList.add('show');
      })
      .on('mouseleave',()=>tt.classList.remove('show'));
  });
}

function zIn(){svgEl.transition().call(zB.scaleBy,1.45);}
function zOut(){svgEl.transition().call(zB.scaleBy,.70);}
function zReset(){svgEl.transition().duration(450).call(zB.transform,d3.zoomIdentity);}

async function init(){
  svgEl=d3.select('#map-svg');
  const W=document.getElementById('map-wrap').clientWidth||960;
  const H=document.getElementById('map-wrap').clientHeight||580;
  proj=d3.geoAlbersUsa().scale(1150).translate([W/2,H/2]);
  svgEl.attr('viewBox',`0 0 ${W} ${H}`);
  const sg=svgEl.append('g').attr('id','states-g');
  svgEl.append('g').attr('id','dots-g');
  zB=d3.zoom().scaleExtent([.7,10]).on('zoom',e=>{
    sg.attr('transform',e.transform);
    svgEl.select('#dots-g').attr('transform',e.transform);
  });
  svgEl.call(zB);
  try{
    const us=await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
    sg.selectAll('path').data(topojson.feature(us,us.objects.states).features)
      .enter().append('path').attr('class','state-path').attr('d',d3.geoPath().projection(proj));
    renderDots();
  }catch(e){
    svgEl.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle')
      .attr('fill','#B5B2A9').attr('font-size','14').text('Map unavailable — check internet connection');
  }
}
